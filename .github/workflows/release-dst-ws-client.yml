name: Release dst-ws-client

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  release:
    name: linux-amd64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"

      - name: Build single-file program
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          go build -trimpath -ldflags="-s -w" -o dist/dst-ws-client-linux-amd64 ./dst-ws-client.go
          chmod +x dist/dst-ws-client-linux-amd64

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/dst-ws-client-linux-amd64
            DST_SCRIPT.sh
            config.example.json
          body: |
            本版本继续完善 `dst-ws-client` 与 Koishi `dst-search` 插件的控房桥接能力，重点优化 WSL2 部署后的聊天同步、存档显示、开服控制和世界信息输出。

            ### 新增

            - 新增聊天桥接控制消息：Koishi 可通过 `开启对话 / 关闭对话` 控制 DST 聊天日志同步。
            - 聊天桥接开启后，DST 玩家发言会按 `【存档名】【世界】【用户名】：内容` 推送回 Koishi 会话。
            - Koishi 群聊文本会按 `【群名】【QQ昵称】（QQ号）：内容` 发送到 DST 公告。
            - `存档列表`、`查进程`、`模组信息`、`世界信息`、`聊天记录` 等输出支持读取 `cluster.ini` 中的 `cluster_name`，同时保留目录名用于实际控制。
            - `世界信息` 增加当前 DST 服务端版本、Steam 最新状态和本地 buildid 输出。
            - 新增 `startServer` 动作，专门处理开服。

            ### 调整

            - `开服 / 启动 / 启动服务器 / 1` 映射到 `startServer`。
            - `重启 / 重启服务器` 保持映射到 `restartAuto`，开服和重启语义正式分离。
            - 开服前会检测 `AutoUpdate <cluster>` 守护进程，不存在则启动，已存在则不重复启动。
            - 开服时如果地上或地下任意世界已运行，不再执行启动或重启流程，只返回“服务器已开启”状态。
            - 聊天桥接开启期间暂停 ws-client 周期性刷新，避免长时间对话同步时 WebSocket 断开重连。

            ### 修复

            - 修复沙盒/群聊普通文本在开启对话后没有稳定同步到 DST 的问题。
            - 修复聊天桥接显示存档名只用文件夹名的问题。
            - 修复聊天记录同时读取地上和地下导致输出冗余的问题，现在只读取第一个可用世界。
            - 修复 `say` 中文公告被错误转义导致 Lua 报变量未声明的问题。
            - 修复回档命令参数传递和控制台发送稳定性问题。

            ### 发布内容

            - Release 附带 `dst-ws-client-linux-amd64`、`DST_SCRIPT.sh` 和 `config.example.json`。
            - `DST_SCRIPT.sh` 脚本版本更新至 `1.8.18`。
          fail_on_unmatched_files: true
